services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mydb;Username=postgres;Password=password
    volumes:
      - ./backend:/src/backend
      - /src/backend/bin
      - /src/backend/obj
    depends_on:
      db:
        condition: service_healthy

  backend-tests:
    build:
      context: .
      dockerfile: backend.tests/Dockerfile
    profiles:
      - test
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./backend:/app/backend
      - ./backend.tests:/app/backend.tests
      - /app/backend/bin
      - /app/backend/obj
      - /app/backend.tests/bin
      - /app/backend.tests/obj

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: