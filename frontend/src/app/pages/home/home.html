<h1 class="title">Your sprints</h1>

<div class="sprint-container">
  <div class="sprint-list">
    @for (s of sprints; track s.id) {
      <button class="sprint-card" (click)="goToSprint(s.id)">
        <h2>{{s.goal}}</h2>
        <p>{{s.startDate | date}} - {{s.endDate | date}}</p>
      </button>
    }
    <button class="sprint-card sprint-add-btn" (click)="addSprint()">
      <h2>+ Add Sprint</h2>
    </button>
  </div>
</div>
